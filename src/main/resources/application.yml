spring:
  application:
    name: spring-ai-chat

  # PostgreSQL
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/springaichat}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema, JPA just validates
    show-sql: false
    open-in-view: false

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Spring AI — model provider selection
  ai:
    model:
      chat: bedrock-converse
      embedding: bedrock-titan

    bedrock:
      aws:
        region: ${AWS_REGION:us-east-1}

      converse:
        chat:
          options:
            model: amazon.nova-micro-v1:0
            max-tokens: 1024
            temperature: 0.3

      # Titan Embeddings V2 for semantic cache
      titan:
        embedding:
          model: amazon.titan-embed-text-v2:0
          input-type: text

    # Redis Vector Store — stores embeddings for semantic cache
    vectorstore:
      type: redis
      redis:
        index-name: semantic-cache-idx
        prefix: "cache:"
        initialize-schema: true   # Creates HNSW index on startup if not exists

    # Chat memory stored in PostgreSQL
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# App-level config
app:
  chat:
    memory:
      max-messages: 20            # Keep last 20 messages per user
  cache:
    similarity-threshold: 0.93   # Cosine similarity threshold for cache hits
  benchmark:
    max-questions: 20            # Safety cap — prevents runaway Bedrock calls
