services:

  redis:
    image: redis/redis-stack:latest
    container_name: spring-ai-redis
    ports:
      - "6379:6379"
      - "8001:8001"       # RedisInsight UI — open localhost:8001 to see what's stored
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: spring-ai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: springaichat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  pg-data:
